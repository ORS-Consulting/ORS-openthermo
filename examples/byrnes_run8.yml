# Byrnes Run 8 - Slow Hydrogen Discharge
#
# Description:
#   Validation against Byrnes et al. hydrogen blowdown experiment Run 8.
#   Slow discharge case with 0.7 mm orifice from 138 bar to 13.5 bar back pressure.
#   Tests hydrogen depressurization with elevated back pressure and external heat transfer.
#
# Reference:
#   Byrnes, W. R., R. C. Reid, and F. E. Ruccia. 1964. "Rapid Depressurization
#   of Gas Storage Cylinder." Industrial & Engineering Chemistry Process Design
#   and Development 3 (3): 206–9. https://doi.org/10.1021/i260011a004.
#
#   Test case parameters from HydDown validation.
#
# Test name: test_byrnes_run8
#
# Expected results:
#   Final pressure: ~14 bar (approaches 13.5 bar back pressure within 15%)
#   Final gas temp: ~274-276 K (within 5% of experiment)
#   Long duration allows heat equilibration with surroundings
#   Matches HydDown predictions within 10%

metadata:
  description: "Byrnes Run 8 - Slow H2 discharge (0.7mm orifice, elevated back pressure)"
  reference: "Byrnes et al. (1964), HydDown validation"
  test_name: "test_byrnes_run8"
  validation_type: "experimental"

# Solver configuration
solver_method: depressurize

# Thermodynamic mode and models
mode: isentropic
heat_transfer: rigorous
eos_model: PR
liquid_density: eos

# Time settings
max_time: 480  # seconds (8 minutes - slow discharge)
delay: 0
time_step: 0.1  # seconds

# Vessel geometry (vertical cylinder)
length: 1.394  # m
diameter: 0.21742  # m
vessel_type: Flat-end
orientation: vertical
wall_thickness: 0.0072  # m (7.2 mm)

# Initial conditions
liquid_level: 0.0  # m - pure gas
water_level: 0.0  # m
operating_temperature: 294.0  # K (21°C)
operating_pressure: 13800000  # Pa (138 bar)

# Environmental conditions
ambient_temperature: 294.0  # K (21°C)
back_pressure: 1350000  # Pa (13.5 bar - elevated back pressure)
external_heat_transfer_coefficient: 10.0  # W/(m²·K) - natural convection

# Discharge device (small orifice)
bdv_orifice_size: 0.0007  # m (0.7 mm - slow discharge)
bdv_orifice_cd: 0.84

# Fluid composition (pure hydrogen)
component_names:
  - hydrogen
molefracs:
  - 1.0

