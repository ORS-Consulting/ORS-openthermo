# Woodfield Hydrogen Discharge Experiment
#
# Description:
#   Validation against Woodfield et al. hydrogen discharge experiment.
#   Hydrogen discharge from 100 bar in small vessel with two temperature
#   measurement locations. Tests heat transfer in small vessels.
#
# Reference:
#   Woodfield, P.L., et al., "Measurement of averaged heat transfer
#   coefficients in high-pressure vessel during charging with hydrogen,
#   nitrogen or argon gas," Journal of Thermal Science and Technology,
#   Vol. 2, No. 2, 2007.
#
#   Test case parameters from HydDown validation.
#
# Test name: test_woodfield_discharge
#
# Expected results:
#   Discharge to near-atmospheric pressure (~0.3-1 bar)
#   Gas temperature variations at different locations
#   Wall temperature remains nearly constant
#   May have platform-specific convergence issues on Linux

metadata:
  description: "Woodfield H2 discharge experiment - small vessel (0.5mm orifice)"
  reference: "Woodfield et al. (2007), HydDown validation"
  test_name: "test_woodfield_discharge"
  validation_type: "experimental"
  notes: "May have platform-specific convergence issues on Linux"

# Solver configuration
solver_method: depressurize

# Thermodynamic mode and models
mode: isentropic
heat_transfer: rigorous
eos_model: PR
liquid_density: eos

# Time settings
max_time: 50  # seconds
delay: 0
time_step: 1  # seconds

# Vessel geometry (small vertical cylinder)
length: 0.212  # m
diameter: 0.075  # m
vessel_type: Flat-end
orientation: vertical
wall_thickness: 0.030  # m (30 mm - thick wall)

# Initial conditions
liquid_level: 0.0  # m - pure gas
water_level: 0.0  # m
operating_temperature: 305.0  # K (32°C)
operating_pressure: 10000000  # Pa (100 bar)

# Environmental conditions
ambient_temperature: 305.0  # K (32°C)
back_pressure: 100000  # Pa (1 bar, atmospheric)
external_heat_transfer_coefficient: 5.0  # W/(m²·K)

# Discharge device (very small orifice)
bdv_orifice_size: 0.0005  # m (0.5 mm - very slow discharge)
bdv_orifice_cd: 0.84

# Fluid composition (hydrogen with trace N2 for flash convergence)
component_names:
  - hydrogen
  - nitrogen
molefracs:
  - 0.9999  # H2 (99.99%)
  - 0.0001  # N2 (0.01% - improves convergence)

