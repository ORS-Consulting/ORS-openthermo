# Nitrogen Blowdown with Control Valve
# Based on test_blowdown_nitrogen_control_valve from tests/test_blowdown.py
#
# This example demonstrates nitrogen blowdown using a control valve for discharge.
# The Cv value has been tuned to match experimental data and orifice behavior.
#
# Expected final conditions:
# - Pressure: ~1.14 bar (vs 1.72 bar experimental)
# - Gas temperature: ~240 K (vs 241 K experimental high, 215 K experimental low)
# - Wall temperature: ~285 K (vs 286 K experimental)

metadata:
  description: "Nitrogen blowdown with control valve (Cv=1.25)"
  reference: "Experiment I1 from Haque et al. (1992), data from Wong (1998) Ph.D. thesis"
  test_name: "test_blowdown_nitrogen_control_valve"
  facility: "Spadeadam (HSE)"

# Solver configuration
solver_method: depressurize  # Use 'depressurize' or 'depressurize_euler'

# Thermodynamic model
eos_model: PR
liquid_density: eos
mode: isentropic

# Heat transfer
heat_transfer: rigorous
wall_thickness: 0.025  # m

# Vessel geometry
length: 1.524  # m
diameter: 0.273  # m
vessel_type: Flat-end
orientation: horizontal

# Initial conditions
operating_pressure: 15000000  # Pa (150 bar)
operating_temperature: 289.0  # K
ambient_temperature: 288  # K
back_pressure: 101000  # Pa (1.01 bar)

# Fluid levels
liquid_level: 0.0  # m (gas phase only)
water_level: 0.0  # m

# Flow device configuration
flow_device: control_valve
bdv_Cv: 1.25  # Valve flow coefficient (tuned to match experimental data)
bdv_xT: 0.75  # Pressure recovery factor

# Leak configuration (inactive in this case)
leak_active: 0
leak_size: 0.01  # m
leak_cd: 0.65
leak_type: liquid

# Fluid composition
component_names: [nitrogen]
molefracs: [1.0]

# Simulation control
max_time: 100  # s
delay: 0  # s

