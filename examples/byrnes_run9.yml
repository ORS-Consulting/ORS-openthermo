# Byrnes Run 9 - Medium Hydrogen Discharge
#
# Description:
#   Validation against Byrnes et al. hydrogen blowdown experiment Run 9.
#   Medium discharge case with 4 mm orifice from 138 bar initial pressure.
#   Tests intermediate discharge rate between fast (Run 7) and slow (Run 8) cases.
#
# Reference:
#   Byrnes, W. R., R. C. Reid, and F. E. Ruccia. 1964. "Rapid Depressurization
#   of Gas Storage Cylinder." Industrial & Engineering Chemistry Process Design
#   and Development 3 (3): 206–9. https://doi.org/10.1021/i260011a004.
#
#   Test case parameters from HydDown validation.
#
# Test name: test_byrnes_run9
#
# Expected results:
#   Final pressure: ~11-15 bar (within 3.5 bar absolute of experiment)
#   Final gas temp: ~193-195 K (within 10% of experiment)
#   Intermediate cooling between fast and slow discharge
#   Matches HydDown predictions within 10%

metadata:
  description: "Byrnes Run 9 - Medium H2 discharge (4mm orifice, 138 bar)"
  reference: "Byrnes et al. (1964), HydDown validation"
  test_name: "test_byrnes_run9"
  validation_type: "experimental"

# Solver configuration
solver_method: depressurize

# Thermodynamic mode and models
mode: isentropic
heat_transfer: rigorous
eos_model: PR
liquid_density: eos

# Time settings
max_time: 15  # seconds (medium-speed discharge)
delay: 0
time_step: 0.01  # seconds (small step for accuracy)

# Vessel geometry (vertical cylinder)
length: 1.394  # m
diameter: 0.21742  # m
vessel_type: Flat-end
orientation: vertical
wall_thickness: 0.0072  # m (7.2 mm)

# Initial conditions
liquid_level: 0.0  # m - pure gas
water_level: 0.0  # m
operating_temperature: 294.0  # K (21°C)
operating_pressure: 13800000  # Pa (138 bar)

# Environmental conditions
ambient_temperature: 294.0  # K (21°C)
back_pressure: 100000  # Pa (1 bar, atmospheric)
external_heat_transfer_coefficient: 0.0  # W/(m²·K) - no external heat transfer

# Discharge device (orifice)
bdv_orifice_size: 0.004  # m (4 mm - medium discharge)
bdv_orifice_cd: 0.84

# Fluid composition (pure hydrogen)
component_names:
  - hydrogen
molefracs:
  - 1.0

